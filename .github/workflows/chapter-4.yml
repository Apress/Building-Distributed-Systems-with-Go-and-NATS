name: Docker Image CI

on:
  push:
    branches: [ "*" ]
    # Publish semver tags as releases.
    tags: [ '*.*.*' ]
    paths:
      - "chapter-4/**"   # Trigger only if changes are in these folders
env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}/chapter-4

jobs:

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch entire history

    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v4.1.1
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF##*/}

    - name: Set Changed Folders
      id: detect-changes
      run: |
         echo "Before Commit: ${{ github.event.before }}"
         echo "Current Commit: ${{ github.sha }}"

         # Run git diff and capture its output
         DIFF_OUTPUT=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

         # Print the output of the git diff command
         echo "Git diff output: $DIFF_OUTPUT"

         # Process and extract the folders
         changed_folders=$(echo "$DIFF_OUTPUT" | grep -E '^(chapter-4/)?(customer|delivery-tracker|order-processor|restaurant-gateway)/' | sed -E 's|^(chapter-4/)?([^/]+)/.*|\2|' | sort | uniq | tr '\n' ' ')

         # Print the final list of changed folders
         echo "Detected changed folders: $changed_folders"

         # Set the changed_folders as a space-separated string
         echo "changed_folders=$changed_folders" >> $GITHUB_ENV
         echo "Detected changed folders: $changed_folders"

    - name: Build and Push image
      if: env.changed_folders != ''
      run: |
        for folder in $changed_folders; do
            echo "Building Docker image for $folder"

            echo ghcr.io/${{ github.repository_owner }}
            echo $IMAGE_NAME
            echo ${GITHUB_REF##*/}
            IMAGE_ID=ghcr.io/$IMAGE_NAME/$folder

            # Change all uppercase to lowercase
            IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
            # Strip git ref prefix from version
            VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
            # Strip "v" prefix from tag name
            [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
            # Use Docker `latest` tag convention
            # [ "$VERSION" == "master" ] && VERSION=latest
            echo IMAGE_ID=$IMAGE_ID
            echo VERSION=$VERSION
            echo NAME=$IMAGE_NAME
            docker build . -f chapter-4/$folder/docker/Dockerfile --tag $IMAGE_ID:$VERSION

            docker push $IMAGE_ID:$VERSION
        done

