apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: order-processor
    name: order-processor
  name: order-processor
spec:
  replicas: 1
  revisionHistoryLimit: 4
  selector:
    matchLabels:
      name: order-processor
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: order-processor
    spec:
      containers:
        - env:
            - name: NATS_URL
              value: "nats://nats:4222"
          image:  ghcr.io/delioda79/distributed-go/chapter-4/order-processor:main
          imagePullPolicy: Always
          name: order-processor
          resources:
            limits:
              cpu: "0.5"
              memory: "100M"
            requests:
              cpu: "0.2"
              memory: "50M"
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: regcred
      restartPolicy: Always
